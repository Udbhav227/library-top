<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Library</title>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="logo-container">
        <h1>PageHeaven</h1>
        <p>A simple library app to track your reading.</p>
      </div>
      <div class="quick-stats">
        <span>Total Books: <span id="totalBooks">0</span></span>
        <span>Reading: <span id="booksReading">0</span></span>
        <span>Read: <span id="booksRead">0</span></span>
      </div>
    </header>
    
    <main>
      <button class="add-btn">
        Add Book
      </button>
      <section class="cards">
        <div class="card">
          <div class="card-image-container">
            <img
              src="img/DaVinciCode.jpg"
            />
          </div>
          <div class="card-content">
            <p class="card-title text--medium">
              Here's the Title of an Awesome Book
            </p>
            <div class="card-info">
              <div class="main-info">
                <p class="card-author">Autor: </p>
                <p class="card-pages text--medium">Pages: </p>
              </div>
              <div class="checkbox-wrapper-33">
                <label class="checkbox">
                  <p class="checkbox__textwrapper">Finished</p> 
                  <input class="checkbox__trigger visuallyhidden" type="checkbox" />
                  <span class="checkbox__symbol">
                    <svg aria-hidden="true" class="icon-checkbox" width="28px" height="28px" viewBox="0 0 28 28" version="1" xmlns="http://www.w3.org/2000/svg">
                      <path d="M4 14l8 7L24 7"></path>
                    </svg>
                  </span>
                </label>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <footer>
    <p>Made with ❤️ by  <a href="https://in.linkedin.com/in/udbhav-ashish" target="_blank">Udbhav Ashish</a></p>
  </footer>
  <script src="script.js" defer></script>
</body>
</html>
